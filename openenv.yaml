name: ict-bot-isaac-navigation
version: "1.0.0"
description: "An OpenEnv-compliant Isaac Sim robotics environment. An AI agent controls a physical Turtlebot navigation through simulated spaces to reach target coordinates while dodging dynamic and static obstacles."
type: physical-simulation
action_space:
  type: discrete
  description: "High-level commands sent to the physics simulator (FORWARD, BACKWARD, TURN_LEFT, TURN_RIGHT, STOP)."
observation_space:
  type: object
  description: "Proprioceptive and exteroceptive sensors: Relative distance to target vectors, heading error, and plain-text environmental status."
tasks:
  - id: task_easy
    difficulty: easy
    description: "Empty room navigation towards a visible target cone."
  - id: task_medium
    difficulty: medium
    description: "Navigation in a narrow corridor avoiding static obstacles (boxes)."
  - id: task_hard
    difficulty: hard
    description: "Navigation in a narrow corridor dodging dynamically moving obstacles."
